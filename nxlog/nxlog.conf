## nxlog.conf – Final working version for your async listener

define ROOT C:\Program Files (x86)\nxlog

Moduledir %ROOT%\modules
CacheDir   %ROOT%\data
Pidfile    %ROOT%\data\nxlog.pid
SpoolDir   %ROOT%\data
LogFile    %ROOT%\data\nxlog.log
LogLevel   INFO

<Extension json>
    Module xm_json
</Extension>

<Input sysmon_in>
    Module im_msvistalog
    Query <QueryList>\
            <Query Id="0" Path="Microsoft-Windows-Sysmon/Operational">\
              <Select>*[System/EventRecordID]</Select>\
            </Query>\
          </QueryList>
    SavePos      TRUE
    ReadFromLast TRUE
</Input>

<Output to_python>
    Module om_tcp
    Host   127.0.0.1
    Port   5050
    Exec   to_json();
</Output>

<Route 1>
    Path sysmon_in => to_python
</Route>